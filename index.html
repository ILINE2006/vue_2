<!doctype html>
<html lang="ru">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta http-equiv="X-UA-Compatible" content="ie=edge">
   <script defer src="js/vue.js"></script>
   <script defer src="js/main.js"></script>
   <link rel="stylesheet" href="css/main.css">
   <title>NOTES</title>
</head>
<body>
  <div id="app">
    <h1>NOTES</h1>
    <div class="columns">
      <note-column 
        v-for="column in columns" 
        :key="column.id"
        :column="column"
        :is-locked="column.id === 1 && isColumn1Locked"
        @add-card="addCard"
        @item-changed="handleItemChanged"
        @delete-card="deleteCard">
      </note-column>
    </div>
        <div class="search-container">
          <input 
            type="text" 
            v-model="searchQuery" 
            placeholder="Поиск по названию карточки..."
            class="search-input">
          <p v-if="searchQuery" class="search-results-count">
            Найдено: {{ filteredCards.length }} карточек
          </p>
        </div>
        
        <div class="search-results" v-if="filteredCards.length > 0">
          <h3>Результаты поиска:</h3>
          <div 
            v-for="card in filteredCards" 
            :key="card.id" 
            class="search-result-card">
            <p><strong>Название:</strong> {{ card.title || 'Без названия' }}</p>
            <p><strong>Статус:</strong> {{ getCardStatus(card.columnId) }}</p>
            <p><strong>Выполнено:</strong> {{ getCompletedItems(card) }} из {{ card.items.length }}</p>
            <p><strong>Прогрес:</strong> {{ getCardProgress(card) }}%</p>
          </div>
        </div>
        <div v-else-if="searchQuery" class="no-results">
          <p>Ничего не найдено</p>
        </div>
  </div>
</body>
</html>
